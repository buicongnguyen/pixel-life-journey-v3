<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Preview - Pixel Life Journey v2</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #26384a;
        color: #f8fbff;
        font-family: Arial, sans-serif;
        overflow-x: hidden;
      }

      .preview-shell {
        width: 100vw;
        padding: 0;
      }

      canvas {
        display: block;
        width: 100vw;
        max-width: 1600px;
        height: auto;
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <canvas id="preview" width="1600" height="1000"></canvas>
    </main>
    <script type="module" src="/src/avatar-preview.ts"></script>
  </body>
</html>
